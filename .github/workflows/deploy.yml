name: Kubernetes CI/CD Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Images & Deploy to Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Lint Helm Chart
        run: |
          helm lint deploy/helm/infervoyage

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to Docker Registry (Configured via GitHub Repository Secrets)
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      # ── Build & Push API Backend ───────────────────────────────────────────
      - name: Build & Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/infervoyage-api:latest
            ${{ secrets.REGISTRY_USERNAME }}/infervoyage-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push SPA Frontend ──────────────────────────────────────────
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/infervoyage-frontend:latest
            ${{ secrets.REGISTRY_USERNAME }}/infervoyage-frontend:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Setup Kubeconfig and Deploy ────────────────────────────────────────
      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      # Deploy using Helm with rolling upgrades
      - name: Deploy to Kubernetes Cluster (Helm)
        run: |
          # Deploying to production namespace
          helm upgrade --install infervoyage-prod deploy/helm/infervoyage \
            --namespace infervoyage-prod \
            --create-namespace \
            -f deploy/helm/infervoyage/values-prod.yaml \
            --set api.image="${{ secrets.REGISTRY_USERNAME }}/infervoyage-api:${{ env.IMAGE_TAG }}" \
            --set frontend.image="${{ secrets.REGISTRY_USERNAME }}/infervoyage-frontend:${{ env.IMAGE_TAG }}"

      # Verify the rollout status of Deployments
      - name: Verify API Deployment Rollout
        run: |
          kubectl rollout status deployment/infervoyage-prod-api -n infervoyage-prod --timeout=300s

      - name: Verify Frontend Deployment Rollout
        run: |
          kubectl rollout status deployment/infervoyage-prod-frontend -n infervoyage-prod --timeout=300s
