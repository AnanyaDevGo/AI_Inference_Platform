apiVersion: 1

providers:
  - name: InferVoyage
    orgId: 1
    folder: InferVoyage
    folderUid: infervoyage
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
