apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infervoyage-ingress
  namespace: infervoyage-dev
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Enable Nginx-level rate limiting (max 10 requests per second from a single IP)
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"
    # Enable CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    # SSL/TLS Redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true" # Set true in production with certs
spec:
  # TLS configurations
  tls:
    - hosts:
        - infervoyage.local
      secretName: infervoyage-tls-cert
  rules:
    - http:
        paths:
          # API Backend endpoints
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          # Frontend endpoints
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
