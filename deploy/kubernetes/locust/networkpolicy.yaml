apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: locust-master-networkpolicy
  namespace: infervoyage-dev
spec:
  podSelector:
    matchLabels:
      app: locust-master
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress to the Locust Web UI (e.g. for port-forwarding)
    - ports:
        - protocol: TCP
          port: 8089
    # Allow workers to connect to the master coordinator
    - from:
        - podSelector:
            matchLabels:
              app: locust-worker
      ports:
        - protocol: TCP
          port: 5557
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow generating load on the API Backend
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: locust-worker-networkpolicy
  namespace: infervoyage-dev
spec:
  podSelector:
    matchLabels:
      app: locust-worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow connection to the Locust Master coordinator
    - to:
        - podSelector:
            matchLabels:
              app: locust-master
      ports:
        - protocol: TCP
          port: 5557
    # Allow generating load on the API Backend
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8000
