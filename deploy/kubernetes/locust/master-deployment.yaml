apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: infervoyage-dev
  labels:
    app: locust-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-master
  template:
    metadata:
      labels:
        app: locust-master
    spec:
      containers:
        - name: locust-master
          image: infervoyage-locust:latest
          imagePullPolicy: IfNotPresent
          args:
            - --master
            - --web-port=8089
          ports:
            - name: web
              containerPort: 8089
            - name: worker
              containerPort: 5557
          env:
            - name: LOCUST_HOST
              value: "http://api:8000"
            - name: TEST_USER_EMAIL
              value: "loadtest@infervoyage.com"
            - name: TEST_USER_PASSWORD
              value: "LoadTest@12345"
            - name: MODEL_NAME
              value: "gemma2:2b"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 5
            periodSeconds: 10
