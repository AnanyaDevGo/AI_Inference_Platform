apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  namespace: infervoyage-dev
  labels:
    app: locust-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locust-worker
  template:
    metadata:
      labels:
        app: locust-worker
    spec:
      containers:
        - name: locust-worker
          image: infervoyage-locust:latest
          imagePullPolicy: IfNotPresent
          args:
            - --worker
            - --master-host=locust-master
          env:
            - name: LOCUST_HOST
              value: "http://api:8000"
            - name: TEST_USER_EMAIL
              value: "loadtest@infervoyage.local"
            - name: TEST_USER_PASSWORD
              value: "LoadTest@12345"
            - name: MODEL_NAME
              value: "llama3"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
