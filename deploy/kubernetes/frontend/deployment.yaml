apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: infervoyage-dev
  labels:
    app: frontend
    app.kubernetes.io/name: infervoyage
    app.kubernetes.io/instance: infervoyage-dev
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: infervoyage
        app.kubernetes.io/instance: infervoyage-dev
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: false   # Caddy needs to bind port 8443
      volumes:
        - name: tls-certs
          secret:
            secretName: infervoyage-tls-cert
      containers:
        - name: frontend
          image: infervoyage-frontend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: API_HOST
              value: "http://infervoyage-dev-api:8000"
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 8443
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/caddy/tls
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
