{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "infervoyage.fullname" . }}-redis
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "infervoyage.selectorLabels" . | nindent 6 }}
      component: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Redis cache traffic from the API Backend
    - from:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: api
      ports:
        - protocol: TCP
          port: 6379
    # Allow Prometheus to scrape metrics from redis-exporter sidecar
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9121
  egress: []
{{- end }}
