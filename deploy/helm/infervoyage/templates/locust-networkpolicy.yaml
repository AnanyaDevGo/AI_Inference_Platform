{{- if and .Values.networkPolicies.enabled .Values.locust.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "infervoyage.fullname" . }}-locust-master
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "infervoyage.selectorLabels" . | nindent 6 }}
      component: locust-master
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress to the Locust Web UI (e.g. for port-forwarding)
    - ports:
        - protocol: TCP
          port: 8089
    # Allow workers to connect to the master coordinator
    - from:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: locust-worker
      ports:
        - protocol: TCP
          port: 5557
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.dnsNamespace }}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow generating load on the API Backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: api
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "infervoyage.fullname" . }}-locust-worker
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "infervoyage.selectorLabels" . | nindent 6 }}
      component: locust-worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.dnsNamespace }}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow connection to the Locust Master coordinator
    - to:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: locust-master
      ports:
        - protocol: TCP
          port: 5557
    # Allow generating load on the API Backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: api
      ports:
        - protocol: TCP
          port: 8000
{{- end }}
