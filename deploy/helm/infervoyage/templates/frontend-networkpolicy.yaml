{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "infervoyage.fullname" . }}-frontend
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "infervoyage.selectorLabels" . | nindent 6 }}
      component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from NGINX Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.ingressControllerNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8443
    # Allow HTTP liveness/readiness probes from Kubelet (any source on port 80)
    - ports:
        - protocol: TCP
          port: 80
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.dnsNamespace }}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow connection to the API backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: api
      ports:
        - protocol: TCP
          port: 8000
{{- end }}
