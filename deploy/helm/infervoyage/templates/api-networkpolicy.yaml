{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "infervoyage.fullname" . }}-api
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "infervoyage.selectorLabels" . | nindent 6 }}
      component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Frontend pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: frontend
      ports:
        - protocol: TCP
          port: 8000
    # Allow traffic from Locust Load Tester master & workers
    {{- if .Values.locust.enabled }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: locust-master
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: locust-worker
      ports:
        - protocol: TCP
          port: 8000
    {{- end }}
    # Allow traffic from Prometheus for scraping metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.monitoringNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.dnsNamespace }}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow database connection (PostgreSQL)
    - to:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow cache connection (Redis)
    - to:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow connection to Ollama inference engine
    - to:
        - podSelector:
            matchLabels:
              {{- include "infervoyage.selectorLabels" . | nindent 14 }}
              component: ollama
      ports:
        - protocol: TCP
          port: 11434
    # Allow connection to external HTTPS/HTTP services (SMTP email, Google OAuth, APIs)
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicies.externalEgress.cidr | quote }}
            {{- if .Values.networkPolicies.externalEgress.exceptCIDRs }}
            except:
              {{- toYaml .Values.networkPolicies.externalEgress.exceptCIDRs | nindent 14 }}
            {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
