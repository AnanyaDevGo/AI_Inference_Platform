apiVersion: v1
kind: Service
metadata:
  name: {{ include "infervoyage.api.fullname" . }}
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
    component: api
spec:
  ports:
    - name: http
      port: 8000
      targetPort: http
  selector:
    {{- include "infervoyage.selectorLabels" . | nindent 4 }}
    component: api
  type: ClusterIP
