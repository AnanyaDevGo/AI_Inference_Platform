apiVersion: v1
kind: Service
metadata:
  name: {{ include "infervoyage.frontend.fullname" . }}
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
    component: frontend
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    {{- include "infervoyage.selectorLabels" . | nindent 4 }}
    component: frontend
  type: ClusterIP
