apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infervoyage.frontend.fullname" . }}
  labels:
    {{- include "infervoyage.labels" . | nindent 4 }}
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "infervoyage.selectorLabels" . | nindent 6 }}
      component: frontend
  template:
    metadata:
      labels:
        {{- include "infervoyage.selectorLabels" . | nindent 8 }}
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: false
        runAsUser: 101
        runAsGroup: 101
      {{- if .Values.ingress.tls.enabled }}
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ .Values.ingress.tls.secretName | quote }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image }}"
          imagePullPolicy: {{ .Values.frontend.pullPolicy }}
          env:
            - name: API_HOST
              value: "http://{{ include "infervoyage.api.fullname" . }}:8000"
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 8443
          {{- if .Values.ingress.tls.enabled }}
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/caddy/tls
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
